name: Post-Game Settlement

# Polls today's games from first pitch until every game is Final,
# then does one trailing settle to catch any MLB Stats API lag.
#
# Lifecycle:
#
#   1. Triggered automatically when Daily Pregame Ingestion succeeds.
#   2. Fetches today's game schedule — finds the first game start time.
#   3. Sleeps until first game start (skip if already past).
#   4. Polls every POLL_MINS, settling any newly-Final games each pass.
#   5. When live count hits 0: waits TRAIL_MINS, settles once more, exits.
#   6. If the 6-hour GitHub Actions hard limit would be hit before all
#      games finish (late West Coast slates), the job exits gracefully
#      and the 2 AM ET safety cron picks up the rest.
#
# Cron safety net (2:00 AM ET = 06:00 UTC): runs a short poll loop
# for any games that outlasted the primary job window.

on:
  workflow_run:
    workflows: ["Daily Pregame Ingestion"]
    types: [completed]
  schedule:
    - cron: "0 6 * * *"    # 2:00 AM ET safety net for late West Coast games
  workflow_dispatch:
    inputs:
      game_date:
        description: "Date to settle (YYYY-MM-DD). Defaults to today ET."
        required: false
        default: ""

env:
  API_BASE:    https://diamond-mind-api.onrender.com
  POLL_MINS:   15     # minutes between settlement passes
  TRAIL_MINS:  20     # extra wait after last game goes Final
  # Safety cap: leave 10 min before GitHub's 6-hour wall (350 min usable)
  MAX_RUNTIME: 350

jobs:
  settle:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    # For workflow_run triggers: only proceed if ingestion succeeded.
    # For cron/manual triggers: always run.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Determine game date (ET)
        id: date
        run: |
          if [ -n "${{ github.event.inputs.game_date }}" ]; then
            echo "game_date=${{ github.event.inputs.game_date }}" >> $GITHUB_OUTPUT
          else
            echo "game_date=$(TZ=America/New_York date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Wake API if sleeping
        run: |
          for i in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              "${{ env.API_BASE }}/health" 2>/dev/null)
            [ "$status" = "200" ] && echo "API healthy." && exit 0
            echo "  Attempt $i: HTTP ${status:-timeout} — waiting 20s…"
            sleep 20
          done
          echo "API not responding — continuing anyway."

      - name: Sleep until first game starts
        if: github.event_name == 'workflow_run'
        env:
          GAME_DATE: ${{ steps.date.outputs.game_date }}
        run: |
          # Fetch today's game schedule and find the earliest game_time_utc.
          FIRST_START=$(curl -s --max-time 30 \
            "${{ env.API_BASE }}/games?game_date=${GAME_DATE}" \
            | python3 - <<'PYEOF'
          import json, sys
          from datetime import datetime, timezone
          try:
              games = json.load(sys.stdin)
              times = [g["game_time_utc"] for g in games if g.get("game_time_utc")]
              if times:
                  print(min(times))
              else:
                  print("")
          except Exception as e:
              print("", file=sys.stdout)
              print(f"Error: {e}", file=sys.stderr)
          PYEOF
          )

          if [ -z "$FIRST_START" ]; then
            echo "No game times found — starting poll loop immediately."
            exit 0
          fi

          echo "First game starts: $FIRST_START"

          NOW_EPOCH=$(date -u +%s)
          START_EPOCH=$(date -u -d "$FIRST_START" +%s 2>/dev/null \
                        || python3 -c "
          from datetime import datetime, timezone
          import sys
          s = '$FIRST_START'
          # Handle both 'Z' suffix and '+00:00'
          s = s.replace('Z','+00:00')
          print(int(datetime.fromisoformat(s).timestamp()))
          ")

          SLEEP_SECS=$(( START_EPOCH - NOW_EPOCH ))

          if [ "$SLEEP_SECS" -le 0 ]; then
            echo "First game already started — beginning poll loop now."
          else
            echo "Sleeping ${SLEEP_SECS}s until first pitch…"
            echo "($(( SLEEP_SECS / 60 )) min)"
            sleep "$SLEEP_SECS"
            echo "First pitch reached — starting poll loop."
          fi

      - name: Poll → settle → repeat until all Final
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          GAME_DATE:   ${{ steps.date.outputs.game_date }}
        run: |
          # ── helpers ──────────────────────────────────────────────────────
          # Wake Render before any work — free tier spins down between requests
          # and our auto-settle endpoint can take >30s cold. One warm /health
          # call gives subsequent calls a fighting chance.
          warm_api() {
            curl -s -o /dev/null --max-time 30 "${API_BASE}/health" || true
          }

          settle() {
            # Generous timeout: production auto-settle iterates every unsettled
            # bet for the date and commits. With ~90 bets + Render cold start
            # this can take well over 30s.
            curl -s -X POST \
              -H "X-Admin-Token: ${ADMIN_TOKEN}" \
              --max-time 180 \
              "${API_BASE}/tracker/auto-settle?game_date=${GAME_DATE}"
          }

          count_live() {
            # Returns integer: games NOT yet in a terminal status.
            # Returns -1 on parse failure (treat as "unknown, keep polling")
            # so a transient empty body never falsely concludes "all done".
            curl -s --max-time 60 \
              "${API_BASE}/games?game_date=${GAME_DATE}" \
            | python3 - <<'PYEOF'
          import json, sys
          TERMINAL = ("Final", "Game Over", "Completed Early")
          try:
              games = json.load(sys.stdin)
              if not isinstance(games, list):
                  print(-1); sys.exit()
              live = [g for g in games
                      if not any(t in (g.get("status") or "") for t in TERMINAL)]
              print(len(live))
          except Exception as e:
              print(-1)
              print(f"count_live error: {e}", file=sys.stderr)
          PYEOF
          }

          summarise_settle() {
            echo "$1" | python3 - <<'PYEOF'
          import json, sys
          try:
              d = json.load(sys.stdin)
              settled = d.get("settled", 0)
              skipped = d.get("skipped_not_final", 0)
              bets = d.get("bets", [])
              print(f"  settled={settled}  still_pending={skipped}")
              for b in bets:
                  sign = "+" if b.get("units_returned", 0) >= 0 else ""
                  print(f"    #{b['bet_id']} {b['game']} {b['market']} {b['selection']}"
                        f" → {b['result']} ({b['score']}) {sign}{b.get('units_returned',0):.2f}u")
          except:
              print("  (could not parse response)")
          PYEOF
          }

          # ── poll loop ────────────────────────────────────────────────────
          JOB_START=$(date +%s)
          PASS=0

          while true; do
            PASS=$(( PASS + 1 ))
            NOW=$(date +%s)
            ELAPSED_MIN=$(( (NOW - JOB_START) / 60 ))

            echo ""
            echo "=== Pass ${PASS} — $(TZ=America/New_York date '+%H:%M ET') (+${ELAPSED_MIN} min) ==="

            # Warm Render before the slow POST so the settle call doesn't
            # eat the entire cold-start window.
            warm_api

            RESULT=$(settle)
            summarise_settle "$RESULT"

            LIVE=$(count_live)
            echo "  Games still live: ${LIVE}"

            # ── all done ─────────────────────────────────────────────────
            # Only exit on an explicit zero. -1 means count_live couldn't
            # parse the response (Render hiccup / cold start) — keep polling.
            if [ "$LIVE" = "0" ]; then
              echo ""
              echo "All games terminal. Waiting ${{ env.TRAIL_MINS }} min for any MLB Stats API lag…"
              sleep $(( ${{ env.TRAIL_MINS }} * 60 ))

              echo ""
              echo "=== Trailing settle — $(TZ=America/New_York date '+%H:%M ET') ==="
              warm_api
              FINAL=$(settle)
              summarise_settle "$FINAL"
              echo "Settlement complete for ${GAME_DATE}."
              exit 0
            fi

            if [ "$LIVE" = "-1" ]; then
              echo "  count_live could not parse response — assuming games still live and continuing."
            fi

            # ── safety cap ───────────────────────────────────────────────
            REMAINING=$(( ${{ env.MAX_RUNTIME }} - ELAPSED_MIN ))
            NEXT_COST=$(( ${{ env.POLL_MINS }} ))
            if [ "$REMAINING" -lt "$NEXT_COST" ]; then
              echo ""
              echo "Approaching runtime cap with ${LIVE} game(s) still live."
              echo "Deferring to the 2:00 AM ET safety-net run."
              exit 0
            fi

            echo "  Sleeping ${{ env.POLL_MINS }} min…"
            sleep $(( ${{ env.POLL_MINS }} * 60 ))
          done
