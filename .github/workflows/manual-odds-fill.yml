name: Manual DraftKings Odds Fill

on:
  workflow_dispatch:
    inputs:
      game_date:
        description: "Game date to fill (YYYY-MM-DD)"
        required: true
        default: "2026-05-21"

env:
  API_BASE: https://diamond-mind-api.onrender.com

jobs:
  fill:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Run ingestion then fill DraftKings odds snapshots
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          GAME_DATE: ${{ github.event.inputs.game_date }}
        run: |
          set -euo pipefail

          if [ "$GAME_DATE" != "2026-05-21" ]; then
            echo "This one-off fill is only wired for 2026-05-21."
            exit 1
          fi

          echo "Waking API..."
          curl -sS --max-time 60 "$API_BASE/health" | python3 -m json.tool

          echo "Checking remote slate before ingestion..."
          game_count=$(curl -sS --max-time 60 "$API_BASE/games?game_date=${GAME_DATE}" | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d) if isinstance(d,list) else 0)')
          echo "remote games before ingestion: ${game_count}"

          if [ "$game_count" != "7" ]; then
            echo "Triggering remote ingestion..."
            curl -sS -X POST \
              --max-time 60 \
              -H "X-Admin-Token: ${ADMIN_TOKEN}" \
              "$API_BASE/admin/run-ingestion?game_date=${GAME_DATE}" > /tmp/ingestion_start.json
            cat /tmp/ingestion_start.json | python3 -m json.tool

            job_id=$(python3 -c 'import json; print(json.load(open("/tmp/ingestion_start.json")).get("job_id",""))')
            if [ -z "$job_id" ]; then
              echo "No ingestion job_id returned."
              exit 1
            fi

            for i in $(seq 1 40); do
              sleep 30
              curl -sS --max-time 60 "$API_BASE/admin/ingestion-status/${job_id}?tail=8" > /tmp/ingestion_status.json
              status=$(python3 -c 'import json; print(json.load(open("/tmp/ingestion_status.json")).get("status",""))')
              last=$(python3 -c 'import json; d=json.load(open("/tmp/ingestion_status.json")); lines=d.get("log_tail",[]); print(lines[-1] if lines else "")')
              echo "ingestion poll ${i}: status=${status} last=${last}"
              if [ "$status" = "done" ]; then
                break
              fi
              if [ "$status" = "error" ]; then
                cat /tmp/ingestion_status.json | python3 -m json.tool
                exit 1
              fi
              if [ "$i" = "40" ]; then
                echo "Timed out waiting for ingestion."
                cat /tmp/ingestion_status.json | python3 -m json.tool
                exit 1
              fi
            done
          fi

          echo "Checking remote slate after ingestion..."
          curl -sS --max-time 60 "$API_BASE/games?game_date=${GAME_DATE}" > /tmp/remote_games.json
          python3 - <<'PY'
          import json
          games = json.load(open("/tmp/remote_games.json"))
          print("games", len(games))
          for g in games:
              print(g.get("id"), g.get("away_team_abbr"), "@", g.get("home_team_abbr"), g.get("status"))
          if len(games) != 7:
              raise SystemExit("Expected 7 remote games before odds fill")
          PY

          python3 - <<'PY' > /tmp/odds_payload.json
          import json

          lines = {
              824274: {"away": "guardians", "home": "tigers", "away_ml": -101, "home_ml": -120, "total": 7.0, "over": -120, "under": -101},
              823056: {"away": "pirates", "home": "cardinals", "away_ml": -120, "home_ml": -101, "total": 7.0, "over": -119, "under": -102},
              822733: {"away": "mets", "home": "nationals", "away_ml": -112, "home_ml": -108, "total": 8.0, "over": -105, "under": -114},
              823864: {"away": "braves", "home": "marlins", "away_ml": -143, "home_ml": 119, "total": 7.5, "over": -109, "under": -111},
              823545: {"away": "blue jays", "home": "yankees", "away_ml": 123, "home_ml": -149, "total": 8.0, "over": -117, "under": -103},
              824031: {"away": "athletics", "home": "angels", "away_ml": -109, "home_ml": -110, "total": 8.5, "over": -104, "under": -115},
              825083: {"away": "rockies", "home": "d-backs", "away_ml": 169, "home_ml": -207, "total": 9.5, "over": 101, "under": -122},
          }

          snapshots = []
          for game_id, line in lines.items():
              snapshots.extend([
                  {"game_id": game_id, "bookmaker": "draftkings", "market": "moneyline", "selection": line["away"], "american_odds": line["away_ml"]},
                  {"game_id": game_id, "bookmaker": "draftkings", "market": "moneyline", "selection": line["home"], "american_odds": line["home_ml"]},
                  {"game_id": game_id, "bookmaker": "draftkings", "market": "total", "selection": "over", "line": line["total"], "american_odds": line["over"]},
                  {"game_id": game_id, "bookmaker": "draftkings", "market": "total", "selection": "under", "line": line["total"], "american_odds": line["under"]},
              ])

          print(json.dumps({"replace_bookmaker": "draftkings", "snapshots": snapshots}))
          PY

          for i in 1 2 3; do
            curl -s -o /dev/null --max-time 30 "$API_BASE/health" || true
            sleep 5
          done

          echo "Posting odds payload..."
          curl -sSf -X POST \
            --max-time 60 \
            -H "Content-Type: application/json" \
            -H "X-Admin-Token: ${ADMIN_TOKEN}" \
            --data @/tmp/odds_payload.json \
            "$API_BASE/admin/odds-snapshots/bulk" | python3 -m json.tool

          echo "Remote picks after fill:"
          curl -sS --max-time 60 "$API_BASE/games/picks?game_date=${GAME_DATE}" > /tmp/remote_picks.json
          python3 - <<'PY'
          import json
          data = json.load(open("/tmp/remote_picks.json"))
          print("count", len(data))
          for x in data:
              print(f"{x.get('away_team_abbr')} @ {x.get('home_team_abbr')}: {x.get('ml_tier')} {x.get('ml_lean')} total={x.get('total_tier')} {x.get('total_lean')} line={x.get('total_line')}")
          PY

          echo "Auto-tracking remote picks..."
          curl -sS -X POST \
            --max-time 60 \
            -H "X-Admin-Token: ${ADMIN_TOKEN}" \
            "$API_BASE/tracker/auto-track?game_date=${GAME_DATE}" | python3 -m json.tool
